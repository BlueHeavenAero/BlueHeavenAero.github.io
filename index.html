<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blue Heaven Aero</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header site-header--compact" id="site-header">
        <a class="logo-link" href="#" aria-label="Home" hidden>
          <img class="logo" id="logo" alt="" width="200" height="48" decoding="async" />
        </a>
      </header>

      <main class="main">
        <section class="hero" aria-labelledby="hero-title">
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-subtitle" id="hero-subtitle" hidden></p>
        </section>

        <section class="media-section" aria-label="Featured video">
          <div class="video-frame" id="video-frame">
            <iframe
              id="video-embed"
              class="video-embed"
              title="Featured video"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
          <p class="video-placeholder" id="video-placeholder" hidden>
            Set <code>youtubeVideoId</code> in <code>site-config.js</code> to show your video.
          </p>
        </section>

        <article class="content markdown-body" id="content" aria-label="Article"></article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="site-config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
